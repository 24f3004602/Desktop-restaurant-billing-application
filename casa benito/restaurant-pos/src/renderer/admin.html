<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body>
  <div class="admin-shell">
    <header class="admin-topbar">
      <div>
        <h1>Admin Panel</h1>
        <p>Menu and table management</p>
      </div>
      <div class="top-actions">
        <button id="themeToggle" class="btn btn-light" type="button">Toggle Theme</button>
        <button id="openReceiptBtn" class="btn btn-light" type="button">Receipt & Printer</button>
        <button id="openReportsBtn" class="btn btn-light" type="button">Reports</button>
        <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
        <button id="goPosBtn" class="btn btn-primary" type="button">Back To POS</button>
      </div>
    </header>

    <main class="admin-grid">
      <section class="panel">
        <div class="panel-head">
          <h2>Categories</h2>
        </div>
        <form id="categoryForm" class="form-grid">
          <input id="categoryNameInput" type="text" placeholder="Category name" required />
          <button class="btn btn-primary" type="submit">Add Category</button>
        </form>
        <div id="categoryList" class="list-wrap"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Add-ons</h2>
        </div>
        <form id="addonForm" class="form-grid addon-form">
          <input id="addonNameInput" type="text" placeholder="Add-on name" required />
          <input id="addonPriceInput" type="number" min="0" step="0.01" placeholder="Price" required />
          <button class="btn btn-primary" type="submit">Add Add-on</button>
        </form>
        <div id="addonList" class="list-wrap"></div>
      </section>

      <section class="panel panel-wide">
        <div class="panel-head">
          <h2>Menu Items</h2>
        </div>
        <form id="menuForm" class="form-grid menu-form">
          <input type="hidden" id="menuItemIdInput" />
          <label>
            <span>Name</span>
            <input id="menuNameInput" type="text" required />
          </label>
          <label>
            <span>SKU</span>
            <input id="menuSkuInput" type="text" />
          </label>
          <label>
            <span>Category</span>
            <select id="menuCategoryInput" required></select>
          </label>
          <label>
            <span>Availability</span>
            <select id="menuAvailableInput">
              <option value="1">In Stock</option>
              <option value="0">Out Of Stock</option>
            </select>
          </label>
          <label class="grow-2">
            <span>Variants (one per line: Name|Price)</span>
            <textarea id="menuVariantsInput" rows="4" placeholder="Small|120\nLarge|180" required></textarea>
          </label>
          <label class="grow-2">
            <span>Add-on IDs (comma separated)</span>
            <input id="menuAddOnIdsInput" type="text" placeholder="1,2" />
          </label>
          <div class="menu-actions">
            <button class="btn btn-primary" type="submit">Save Item</button>
            <button class="btn btn-light" type="button" id="resetMenuFormBtn">Reset</button>
          </div>
        </form>
        <div id="menuList" class="list-wrap"></div>
      </section>

      <section class="panel panel-wide">
        <div class="panel-head">
          <h2>Tables</h2>
        </div>
        <p id="tablePolicyHint" class="status-message"></p>
        <form id="tableForm" class="form-grid table-form">
          <input type="hidden" id="tableIdInput" />
          <input id="tableCodeInput" type="text" placeholder="Code (T11)" required />
          <input id="tableNameInput" type="text" placeholder="Display Name" required />
          <input id="tableCapacityInput" type="number" min="1" step="1" placeholder="Capacity" required />
          <select id="tableActiveInput">
            <option value="1">Active</option>
            <option value="0">Inactive</option>
          </select>
          <button class="btn btn-primary" type="submit">Save Table</button>
          <button class="btn btn-light" type="button" id="resetTableFormBtn">Reset</button>
        </form>
        <div id="tableList" class="list-wrap"></div>
      </section>
    </main>

    <p id="statusMessage" class="status-message"></p>
  </div>

  <script src="./components/ui.js"></script>
  <script src="./js/admin.js"></script>
</body>
</html>
