<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/pos.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <h1>Casa Benito POS</h1>
        <p class="subtitle">Fast billing for dine-in and takeaway</p>
      </div>

      <div class="topbar-controls">
        <label class="search-wrap" for="searchInput" aria-label="Search menu items">
          <span>Search</span>
          <input id="searchInput" type="text" placeholder="Type item name..." autocomplete="off" />
        </label>

        <label class="filter-wrap" for="orderTypeSelect">
          <span>Order Type</span>
          <select id="orderTypeSelect">
            <option value="DINE_IN">Dine-in</option>
            <option value="TAKEAWAY">Takeaway</option>
          </select>
        </label>

        <label class="filter-wrap" for="tableSelect">
          <span>Table</span>
          <select id="tableSelect">
            <option value="">Loading...</option>
          </select>
        </label>

        <button id="themeToggle" class="btn btn-ghost" type="button" aria-label="Toggle theme">
          Toggle Theme
        </button>

        <button id="openAdminBtn" class="btn btn-light" type="button">
          Admin Panel
        </button>

        <button id="openReceiptBtn" class="btn btn-light" type="button">
          Receipt & Printer
        </button>

        <button id="openReportsBtn" class="btn btn-light" type="button">
          Reports
        </button>

        <button id="logoutBtn" class="btn btn-danger" type="button">
          Logout
        </button>
      </div>
    </header>

    <main class="main-grid" role="main">
      <aside class="panel categories-panel" aria-label="Categories">
        <div class="panel-head">
          <h2>Categories</h2>
          <span id="categoryCount" class="tag">0</span>
        </div>
        <div id="categoryList" class="category-list"></div>
      </aside>

      <section class="panel items-panel" aria-label="Menu Items">
        <div class="panel-head">
          <h2>Menu Items</h2>
          <p id="itemsMeta" class="muted">0 items shown</p>
        </div>
        <div id="itemGrid" class="item-grid"></div>
      </section>

      <aside class="panel billing-panel" aria-label="Billing Panel">
        <div class="panel-head">
          <h2>Current Bill</h2>
          <span id="draftState" class="pill">Draft</span>
        </div>

        <div class="bill-context">
          <div><strong>Order:</strong> <span id="orderTypeLabel">Dine-in</span></div>
          <div><strong>Ref:</strong> <span id="orderRef">T1-001</span></div>
        </div>

        <div id="billItems" class="bill-items" aria-live="polite"></div>

        <div class="bill-summary">
          <div class="summary-row"><span>Subtotal</span><span id="subtotalValue">0.00</span></div>
          <div class="summary-row"><span>Discount</span><span id="discountValue">0.00</span></div>
          <div class="summary-row total"><span>Total</span><span id="totalValue">0.00</span></div>
        </div>

        <div class="discount-row">
          <button class="btn btn-light" type="button" data-discount="PERCENT_10">10% Off</button>
          <button class="btn btn-light" type="button" data-discount="FIXED_50">Rs 50 Off</button>
          <button class="btn btn-light" type="button" data-discount="CLEAR">Clear</button>
        </div>

        <div class="action-grid">
          <button class="btn btn-primary" type="button" id="saveDraftBtn">Save Draft</button>
          <button class="btn btn-light" type="button" id="mergeBtn">Merge Table Orders</button>
          <button class="btn btn-secondary" type="button" id="prepareBtn">Preparing</button>
          <button class="btn btn-secondary" type="button" id="servedBtn">Served</button>
          <button class="btn btn-success" type="button" id="payBtn">Pay</button>
          <button class="btn btn-warning" type="button" id="reprintBtn">Reprint</button>
          <button class="btn btn-danger" type="button" id="cancelBtn">Cancel</button>
        </div>

        <div class="shortcut-note">
          <p><strong>Shortcuts:</strong> <kbd>F2</kbd> Save Draft, <kbd>F4</kbd> Pay, <kbd>/</kbd> Focus Search</p>
        </div>

        <p id="statusMessage" class="status-message" aria-live="polite"></p>
      </aside>
    </main>
  </div>

  <div id="itemConfigModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalItemTitle">Configure Item</h3>
        <button id="closeItemModalBtn" type="button" class="btn btn-ghost">Close</button>
      </div>

      <div class="modal-body">
        <section>
          <h4>Choose Variant</h4>
          <div id="variantOptions" class="choice-grid"></div>
        </section>

        <section>
          <h4>Choose Add-ons</h4>
          <div id="addonOptions" class="choice-grid"></div>
        </section>
      </div>

      <div class="modal-actions">
        <button id="confirmItemBtn" type="button" class="btn btn-primary">Add Item</button>
      </div>
    </div>
  </div>

  <div id="paymentModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card payment-modal-card">
      <div class="modal-head">
        <h3>Split Payment</h3>
        <button id="closePaymentModalBtn" type="button" class="btn btn-ghost">Close</button>
      </div>

      <div class="modal-body">
        <p id="paymentRemaining" class="muted"></p>
        <label class="filter-wrap" for="paymentMethodSelect">
          <span>Method</span>
          <select id="paymentMethodSelect">
            <option value="CASH">Cash</option>
            <option value="UPI">UPI</option>
            <option value="CARD">Card</option>
          </select>
        </label>

        <label class="filter-wrap" for="paymentAmountInput">
          <span>Amount</span>
          <input id="paymentAmountInput" type="number" min="0" step="0.01" />
        </label>

        <label class="filter-wrap" for="paymentReferenceInput">
          <span>Reference (Optional)</span>
          <input id="paymentReferenceInput" type="text" />
        </label>

        <div id="paymentHistory" class="payment-history"></div>
      </div>

      <div class="modal-actions">
        <button id="addPaymentLineBtn" type="button" class="btn btn-light">Add Payment Line</button>
        <button id="confirmPaymentBtn" type="button" class="btn btn-success">Complete Payment</button>
      </div>
    </div>
  </div>

  <script src="./components/ui.js"></script>
  <script src="./js/pos.js"></script>
</body>
</html>
