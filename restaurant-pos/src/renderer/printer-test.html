<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Printer Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/receipt.css" />
</head>
<body>
  <div class="settings-shell">
    <header class="settings-topbar">
      <div>
        <h1>Printer Test Page</h1>
        <p>Sample ticket preview, cutter feed tuning, and print test</p>
      </div>
      <div class="top-actions">
        <button id="themeToggle" class="btn btn-light" type="button">Toggle Theme</button>
        <button id="goReceiptBtn" class="btn btn-light" type="button">Receipt Settings</button>
        <button id="openReportsBtn" class="btn btn-light" type="button">Reports</button>
        <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
        <button id="goPosBtn" class="btn btn-primary" type="button">POS</button>
      </div>
    </header>

    <main class="settings-grid">
      <section class="panel">
        <div class="panel-head"><h2>Test Profile Tuning</h2></div>
        <form id="testProfileForm" class="form-grid">
          <label>
            <span>Paper Width (mm)</span>
            <input id="paperWidthInput" type="number" min="50" max="120" required />
          </label>
          <label>
            <span>Cutter Feed Lines</span>
            <input id="cutterFeedLinesInput" type="number" min="0" max="20" required />
          </label>
          <label class="inline-check">
            <input id="silentPrintInput" type="checkbox" />
            <span>Silent Print</span>
          </label>
          <button class="btn btn-light" type="button" id="reloadPreviewBtn">Reload Sample Preview</button>
          <button class="btn btn-primary" type="submit">Print Sample Ticket</button>
        </form>
      </section>

      <section class="panel panel-wide">
        <div class="panel-head"><h2>Sample Ticket Preview</h2></div>
        <iframe id="previewFrame" class="receipt-frame" title="Sample Ticket Preview"></iframe>
      </section>
    </main>

    <p id="statusMessage" class="status-message"></p>
  </div>

  <script src="./js/printer-test.js"></script>
</body>
</html>
