<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <h1>Casa Benito POS</h1>
      <p id="authModeLabel" class="muted">Admin Login</p>

      <form id="authForm" class="form-grid">
        <label>
          <span>Username</span>
          <input id="usernameInput" type="text" required />
        </label>

        <label>
          <span>Password</span>
          <input id="passwordInput" type="password" required minlength="6" />
        </label>

        <label id="confirmWrap" class="hidden">
          <span>Confirm Password</span>
          <input id="confirmPasswordInput" type="password" minlength="6" />
        </label>

        <button id="authSubmitBtn" class="btn btn-primary" type="submit">Login</button>
      </form>

      <p id="statusMessage" class="status-message"></p>
    </section>
  </main>

  <script src="./js/login.js"></script>
</body>
</html>
